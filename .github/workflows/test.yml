name: Tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies (minimal — no crewai/litellm)
        run: |
          pip install --upgrade pip
          pip install z3-solver pyyaml python-dotenv rich blake3

      - name: Install dof package (no transitive deps)
        run: pip install -e . --no-deps

      - name: Run tests
        # pytest has a web3 plugin conflict in this project — use unittest runner
        run: |
          python -m unittest \
            tests.test_ast_verifier \
            tests.test_z3_verifier \
            tests.test_adversarial \
            tests.test_constitution \
            tests.test_task_contract \
            tests.test_causal \
            tests.test_bayesian_provider \
            tests.test_memory_governance \
            tests.test_oags_bridge \
            tests.test_oracle_bridge \
            -v

      - name: Verify public API imports
        run: python -c "import dof; print('dof', dof.__version__, '— OK')"

      - name: Run quickstart example (smoke test)
        run: python examples/quickstart.py
        # Z3 proofs, governance, metrics, and error classification
        # run without any API keys or crewai dependency.

name: DOF CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies (minimal — no crewai/litellm)
      run: |
        pip install --upgrade pip
        pip install z3-solver pyyaml python-dotenv rich blake3 fastapi httpx sqlalchemy web3

    - name: Install dof package
      run: pip install -e . --no-deps

    - name: Run tests (unittest — avoids web3/pytest conflict)
      run: |
        python -m unittest \
          tests.test_ast_verifier \
          tests.test_z3_verifier \
          tests.test_adversarial \
          tests.test_constitution \
          tests.test_task_contract \
          tests.test_causal \
          tests.test_bayesian_provider \
          tests.test_memory_governance \
          tests.test_oags_bridge \
          tests.test_oracle_bridge \
          tests.test_full_pipeline \
          tests.test_mcp_server \
          tests.test_api \
          tests.test_storage \
          tests.test_integrations \
          tests.test_enigma_bridge \
          tests.test_avalanche_bridge \
          tests.test_entropy_detector \
          tests.test_regression_tracker \
          -v

    - name: Run Z3 verification
      run: |
        python -c "
        from dof import verify
        results = verify()
        for r in results:
            print(f'  {r.result}  {r.theorem_name}  ({r.proof_time_ms:.2f}ms)')
        assert all(r.result == 'VERIFIED' for r in results), 'Z3 verification failed'
        print('All 4 theorems verified')
        "

    - name: Verify public API imports
      run: python -c "import dof; print('dof', dof.__version__, '— OK')"

    - name: Regression Check
      run: |
        python -m dof regression-baseline
        python -m dof regression-check

    - name: Run quickstart smoke test
      run: python examples/quickstart.py

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install flake8
      run: |
        pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        flake8 core/ dof/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 core/ dof/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

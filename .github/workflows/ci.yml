name: DOF CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short --co -q 2>/dev/null | tail -5
        python -m pytest tests/ -v --tb=short -x

    - name: Run e2e tests
      run: |
        python scripts/e2e_test.py

    - name: Run Z3 verification
      run: |
        python -c "
        from core.z3_verifier import Z3Verifier
        z3 = Z3Verifier()
        results = z3.verify_all()
        for r in results:
            status = 'VERIFIED' if r.result == 'VERIFIED' else 'FAILED'
            print(f'  {status}  {r.theorem_name}  ({r.proof_time_ms:.2f}ms)')
        assert all(r.result == 'VERIFIED' for r in results), 'Z3 verification failed'
        print('All 4 theorems verified')
        "

    - name: Run adversarial benchmark
      run: |
        python scripts/run_benchmark.py

    - name: Verify GenericAdapter
      run: |
        python -c "
        from dof import GenericAdapter
        result = GenericAdapter().wrap_output('Test output for CI validation')
        print(f'GenericAdapter: status={result[\"status\"]}, score={result.get(\"score\", \"N/A\")}')
        assert result['status'] != 'error', 'GenericAdapter failed'
        print('GenericAdapter OK')
        "

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 core/ dof/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warnings only for complexity
        flake8 core/ dof/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics
